<div class="container mt-4">
	<div class="row g-4 align-items-start">
		<div class="col-12 col-lg-8">
			<table class="table table-striped table-hover">
				<thead class="table-dark">
					<tr>
						<th>#</th>
						<th>Nombre</th>
						<th>Canal</th>
						<th>Temporadas</th>
					</tr>
				</thead>
				<tbody>
					<tr *ngFor="let s of series">
						<td>{{ s.id }}</td>
						<td>
							<button type="button" class="btn btn-link p-0 text-start" (click)="onSelectSerie(s)">
								{{ s.name }}
							</button>
						</td>
						<td>{{ s.channel }}</td>
						<td [class.text-danger]="s.seasons > 6" [class.fw-bold]="s.seasons > 6">{{ s.seasons }}</td>
					</tr>
				</tbody>
			</table>

			<p class="mt-3 mb-0">
				<strong>Promedio de temporadas:</strong>
				{{ averageSeasons | number: '1.1-2' }}
			</p>
		</div>

		<div class="col-12 col-lg-4" *ngIf="selectedSerie">
			<div class="card shadow-sm">
				<img [src]="selectedSerie.poster" class="card-img-top" [alt]="selectedSerie.name" />
				<div class="card-body">
					<h5 class="card-title">{{ selectedSerie.name }}</h5>
					<p class="card-text">{{ selectedSerie.description }}</p>
					<a [href]="selectedSerie.webpage" target="_blank" rel="noopener noreferrer" class="btn btn-primary">
						Ir a la pagina oficial
					</a>
				</div>
			</div>
		</div>
	</div>
</div>
